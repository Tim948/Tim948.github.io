<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim948 | Go Backend Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020004;
            --bg-card: rgba(10, 5, 25, 0.85);
            --neon-pink: #ff0055;
            --neon-blue: #00f2ff;
            --neon-green: #0ff04e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --font-header: 'Orbitron', sans-serif;
            --font-code: 'Share Tech Mono', monospace;
            --font-body: 'Rajdhani', sans-serif;
        }

        /* Обнуление и фиксация центрирования */
        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            /* Жесткое центрирование контента */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ФОН: Абсолютное позиционирование, чтобы не влиять на центрирование карточки */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* Самый нижний слой */
        }

        /* КАРТОЧКА ПРОФИЛЯ */
        .cyber-profile {
            position: relative;
            z-index: 10; /* Слой выше фона */
            width: 95%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px;
            padding: 35px;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 242, 255, 0.05);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Сканирующая полоса сверху вниз */
        .cyber-profile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 6s linear infinite;
            opacity: 0.5;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Аватар */
        .avatar-box {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            padding: 4px;
            object-fit: cover;
            filter: drop-shadow(0 0 8px var(--neon-blue));
            transition: 0.4s;
        }
        
        .avatar:hover { transform: rotate(5deg) scale(1.05); }

        /* Текст */
        .name {
            font-family: var(--font-header);
            font-size: 1.8rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
        }

        .nickname {
            font-family: var(--font-code);
            color: var(--neon-pink);
            font-size: 1.1rem;
            display: block;
            margin-bottom: 20px;
            text-shadow: 0 0 5px var(--neon-pink);
        }

        .bio-box {
            background: rgba(0, 0, 0, 0.4);
            border-left: 3px solid var(--neon-green);
            padding: 12px;
            text-align: left;
            font-family: var(--font-code);
            font-size: 0.85rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        /* Скиллы */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .skill {
            padding: 3px 8px;
            border: 1px solid rgba(0, 242, 255, 0.4);
            font-family: var(--font-code);
            font-size: 0.7rem;
            border-radius: 4px;
            color: var(--neon-blue);
            transition: 0.3s;
        }

        .skill:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 12px var(--neon-blue);
        }

        /* Кнопки */
        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            text-decoration: none;
            padding: 10px;
            font-family: var(--font-header);
            font-size: 0.75rem;
            border-radius: 4px;
            transition: 0.3s;
            text-align: center;
            border: 1px solid;
            font-weight: bold;
        }

        .btn-tg { color: var(--neon-blue); border-color: var(--neon-blue); }
        .btn-tg:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }

        .btn-vk { color: #4C75A3; border-color: #4C75A3; }
        .btn-vk:hover { background: #4C75A3; color: #fff; box-shadow: 0 0 15px #4C75A3; }

        .btn-li { grid-column: span 2; color: var(--neon-pink); border-color: var(--neon-pink); }
        .btn-li:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 15px var(--neon-pink); }

    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="cyber-profile">
        <div class="avatar-box">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Tim948&baseColor=00f2ff" alt="Avatar" class="avatar">
        </div>

        <h1 class="name">Данил Яманаев</h1>
        <span class="nickname">Tim948 // BACKEND</span>

        <div class="bio-box">
            > [ROLE]: Go Developer<br>
            > [EDU]: Магистратура УГНТУ (2026)<br>
            > [STATUS]: <span style="color:var(--neon-green)">ONLINE</span>
        </div>

        <div class="skills">
            <span class="skill">Go</span>
            <span class="skill">C#</span>
            <span class="skill">PostgreSQL</span>
            <span class="skill">Redis</span>
            <span class="skill">Kafka</span>
            <span class="skill">gRPC</span>
            <span class="skill">Docker</span>
            <span class="skill">MongoDB</span>
        </div>

        <div class="links">
            <a href="https://t.me/ElegantCoderByte" class="btn btn-tg" target="_blank">TELEGRAM</a>
            <a href="https://vk.ru/ne_ydachi" class="btn btn-vk" target="_blank">VK.COM</a>
            <a href="#" class="btn btn-li" target="_blank">LINKEDIN (NOT SET)</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        // Установка размеров
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const codeSnippets = [
            "go func()", "chan int", "defer db.Close()", "SELECT * FROM", 
            "01", "10", "err != nil", "gRPC.v3", "docker-compose", 
            "interface{}", "struct {", "kafka.Join()", "redis.Get()"
        ];

        const fontSize = 14;
        const columns = Math.floor(canvas.width / 100); // Реже колонки для красоты
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = Math.random() * -100;
        }

        function draw() {
            // Полупрозрачный черный для эффекта "шлейфа"
            ctx.fillStyle = 'rgba(2, 0, 4, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00f2ff22'; // Очень прозрачный синий неон
            ctx.font = fontSize + 'px "Share Tech Mono"';

            for (let i = 0; i < drops.length; i++) {
                const text = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
                
                // Рандомные координаты для разброса
                const x = i * (canvas.width / columns);
                const y = drops[i] * fontSize;

                ctx.fillText(text, x, y);

                if (y > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i] += 0.5; // Скорость падения
            }
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
