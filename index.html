<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tim948 | Go Backend Developer</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #020004;
            --bg-card: rgba(10, 5, 25, 0.8);
            --neon-pink: #ff0055;
            --neon-blue: #00f2ff;
            --neon-green: #0ff04e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --font-header: 'Orbitron', sans-serif;
            --font-code: 'Share Tech Mono', monospace;
            --font-body: 'Rajdhani', sans-serif;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- ФОН: ДИНАМИЧЕСКИЙ КИБЕР-КОД --- */
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* --- КАРТОЧКА ПРОФИЛЯ --- */
        .cyber-profile {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 500px;
            background: var(--bg-card);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 242, 255, 0.05);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Декор: Сканирующая полоса */
        .cyber-profile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* Аватар */
        .avatar-box {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            padding: 5px;
            object-fit: cover;
            filter: drop-shadow(0 0 10px var(--neon-blue));
        }

        /* Текстовые блоки */
        .name {
            font-family: var(--font-header);
            font-size: 2rem;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .nickname {
            font-family: var(--font-code);
            color: var(--neon-pink);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 20px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 0 var(--neon-blue), -2px 0 var(--neon-pink); }
            5% { text-shadow: -2px 0 var(--neon-blue), 2px 0 var(--neon-pink); }
            10% { text-shadow: 0 0 0; }
        }

        .bio-box {
            background: rgba(0, 0, 0, 0.5);
            border-left: 3px solid var(--neon-green);
            padding: 15px;
            text-align: left;
            font-family: var(--font-code);
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        /* Стек технологий */
        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .skill {
            padding: 4px 10px;
            border: 1px solid var(--text-muted);
            font-family: var(--font-code);
            font-size: 0.75rem;
            border-radius: 4px;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .skill:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transform: translateY(-2px);
        }

        /* Кнопки */
        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            padding: 12px;
            font-family: var(--font-header);
            font-size: 0.8rem;
            border-radius: 4px;
            transition: 0.4s;
            text-align: center;
            border: 1px solid;
            position: relative;
            overflow: hidden;
        }

        .btn-tg { color: var(--neon-blue); border-color: var(--neon-blue); }
        .btn-tg:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        .btn-vk { color: #4C75A3; border-color: #4C75A3; }
        .btn-vk:hover { background: #4C75A3; color: #fff; box-shadow: 0 0 20px #4C75A3; }

        .btn-li { grid-column: span 2; color: var(--neon-pink); border-color: var(--neon-pink); }
        .btn-li:hover { background: var(--neon-pink); color: #fff; box-shadow: 0 0 20px var(--neon-pink); }

    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>

    <div class="cyber-profile">
        <div class="avatar-box">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Tim948&baseColor=00f2ff" alt="Avatar" class="avatar">
        </div>

        <h1 class="name">Данил Яманаев</h1>
        <span class="nickname">ID: Tim948 // NETRUNNER</span>

        <div class="bio-box">
            > [ROLE]: Backend Go Developer<br>
            > [LOC]: УГНТУ, Магистратура (2026)<br>
            > [STATUS]: <span style="color:var(--neon-green)">READY_TO_DEPLOY</span>
        </div>

        <div class="skills">
            <span class="skill">Go</span>
            <span class="skill">C#</span>
            <span class="skill">PostgreSQL</span>
            <span class="skill">MongoDB</span>
            <span class="skill">Gin</span>
            <span class="skill">gRPC</span>
            <span class="skill">Kafka</span>
            <span class="skill">Redis</span>
            <span class="skill">Docker</span>
            <span class="skill">K8s</span>
        </div>

        <div class="links">
            <a href="https://t.me/ElegantCoderByte" class="btn btn-tg" target="_blank">TELEGRAM</a>
            <a href="https://vk.ru/ne_ydachi" class="btn btn-vk" target="_blank">VK.COM</a>
            <a href="#" class="btn btn-li" target="_blank">LINKEDIN (EMPTY)</a>
        </div>
    </div>

    <script>
        // Скрипт для создания динамического фона с кодом
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const codeSnippets = [
            "func main() {", "go func() {", "chan int", "SELECT * FROM", 
            "db.Connect()", "docker-compose up", "nil != err", 
            "01", "10", "gRPC.Call", "kafka.Produce", "struct {", "interface{}"
        ];

        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function draw() {
            ctx.fillStyle = 'rgba(2, 0, 4, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#00f2ff'; // Цвет летящего кода
            ctx.font = fontSize + 'px "Share Tech Mono"';

            for (let i = 0; i < drops.length; i++) {
                const text = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
                ctx.fillText(text, i * fontSize * 4, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(draw, 50);
    </script>
</body>
</html>
